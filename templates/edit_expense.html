{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container" style="max-width: 520px;">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update the details of this transaction.</p>
        </div>

        <div class="auth-card">

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title"
                           class="form-input"
                           value="{{ request.form.title if error else expense.title }}"
                           required autofocus>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount"
                               class="form-input" placeholder="0.00"
                               step="0.01" min="0.01"
                               value="{{ request.form.amount if error else expense.amount }}"
                               required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date"
                               class="form-input"
                               value="{{ request.form.date if error else expense.date }}"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input form-select">
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% set current = request.form.get('category') if error else expense.category %}
                            {% if current == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="note">Note <span class="label-optional">(optional)</span></label>
                    <textarea id="note" name="note"
                              class="form-input form-textarea"
                              placeholder="Any extra details…">{{ request.form.note if error else (expense.note or '') }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit" style="width: auto; padding: 0.65rem 1.75rem;">
                        Save changes
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn-ghost">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</section>

{% endblock %}
