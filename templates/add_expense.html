{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container" style="max-width: 520px;">

        <div class="auth-header">
            <h1 class="auth-title">Add expense</h1>
            <p class="auth-subtitle">Log a new transaction to your account.</p>
        </div>

        <div class="auth-card">

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title"
                           class="form-input" placeholder="e.g. Groceries, Uber ride…"
                           value="{{ request.form.title or '' }}"
                           required autofocus>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount"
                               class="form-input" placeholder="0.00"
                               step="0.01" min="0.01"
                               value="{{ request.form.amount or '' }}"
                               required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date"
                               class="form-input"
                               value="{{ request.form.date or today }}"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input form-select">
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% if request.form.get('category', 'Food') == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="note">Note <span class="label-optional">(optional)</span></label>
                    <textarea id="note" name="note"
                              class="form-input form-textarea"
                              placeholder="Any extra details…">{{ request.form.note or '' }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Save expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('dashboard') }}">← Back to dashboard</a>
        </p>

    </div>
</section>

{% endblock %}
